<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta name="description" content="Frequently asked questions about the psychological services offered by Dr. Stephen Quigley">
    <meta name="author" content="Dr. Stephen Quigley">
    <title>Frequently Asked Questions - Dr. Stephen Quigley</title>
    <link rel="icon" type="image/x-icon" href="assets/favicon.ico">
    <script src="https://use.fontawesome.com/releases/v6.3.0/js/all.js" crossorigin="anonymous"></script>
    <link href="https://fonts.googleapis.com/css?family=Lora:400,700,400italic,700italic" rel="stylesheet" type="text/css">
    <link href="https://fonts.googleapis.com/css?family=Open+Sans:300italic,400italic,600italic,700italic,800italic,400,300,600,700,800" rel="stylesheet" type="text/css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <div id="header-placeholder"></div>

    <!-- Page Header-->
    <header class="masthead faq-masthead">
        <img src="assets/img/contact.jpg" alt="" class="masthead-bg">
        <div class="container position-relative px-4 px-lg-5">
            <div class="row gx-4 gx-lg-5 justify-content-center">
                <div class="col-md-10 col-lg-8 col-xl-7">
                    <div class="page-heading">
                        <h2 class="faq-header">Frequently Asked Questions</h2>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content-->
    <div class="faq-container">
        <div class="row justify-content-center">
            <div class="col-12">
                <p class="lead text-center mb-5">Find answers to commonly asked questions about my services. If you have additional questions, please don't hesitate to contact me.</p>

                <div id="faq-content">
                    <!-- Dynamically loaded from content/faq.json -->
                </div>

                <!-- Contact CTA -->
                <div class="contact-cta">
                    <h3>Still have questions?</h3>
                    <p>I'm here to help. Contact me for more information about my services or to schedule an appointment.</p>
                    <a href="contact.html" class="contact-button">Contact Me</a>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer-->
    <div id="footer-placeholder"></div>

    <!-- Bootstrap core JS-->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Core theme JS-->
    <script src="js/scripts.js"></script>
    <script>
    document.addEventListener('DOMContentLoaded', function () {
        fetch('content/faq.json')
            .then(r => { if (!r.ok) throw new Error(); return r.json(); })
            .then(renderFaq)
            .catch(() => {});
    });

    function renderFaq(data) {
        const container = document.getElementById('faq-content');
        if (!container) return;

        let html = '';
        (data.sections || []).forEach(function (section, sIdx) {
            const accordionId = 'accordion-section-' + sIdx;
            let items = '';
            (section.items || []).forEach(function (item, iIdx) {
                const itemId = 'item-' + sIdx + '-' + iIdx;
                const isFirst = iIdx === 0 && sIdx === 0;
                items += '<div class="accordion-item">' +
                    '<h2 class="accordion-header" id="heading-' + itemId + '">' +
                    '<button class="accordion-button' + (isFirst ? '' : ' collapsed') + '" type="button" ' +
                    'data-bs-toggle="collapse" data-bs-target="#collapse-' + itemId + '" ' +
                    'aria-expanded="' + (isFirst ? 'true' : 'false') + '" aria-controls="collapse-' + itemId + '">' +
                    escHtml(item.question) +
                    '</button></h2>' +
                    '<div id="collapse-' + itemId + '" class="accordion-collapse collapse' + (isFirst ? ' show' : '') + '" ' +
                    'aria-labelledby="heading-' + itemId + '" data-bs-parent="#' + accordionId + '">' +
                    '<div class="accordion-body">' + escHtml(item.answer) + '</div>' +
                    '</div></div>';
            });
            html += '<div class="faq-section">' +
                '<h3 class="faq-section-title">' + escHtml(section.title) + '</h3>' +
                '<div class="accordion" id="' + accordionId + '">' + items + '</div>' +
                '</div>';
        });
        container.innerHTML = html;
    }

    function escHtml(str) {
        return String(str)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;');
    }
    </script>
</body>
</html>
