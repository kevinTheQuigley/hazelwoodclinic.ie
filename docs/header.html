<script>
// Enhanced mobile dropdown and sticky header functionality
(function() {
    'use strict';
    
    // Wait for DOM to be ready
    function ready(fn) {
        if (document.readyState !== 'loading') {
            fn();
        } else {
            document.addEventListener('DOMContentLoaded', fn);
        }
    }
    
    ready(function() {
        const navbar = document.getElementById('mainNav');
        
        // Mobile dropdown functionality - JavaScript-based auto-expand
        function initMobileDropdowns() {
            // Reset all dropdown states on initialization
            document.querySelectorAll('.menu-item-has-children').forEach(function(item) {
                item.classList.remove('show');
                const subMenu = item.querySelector('.dropdown-menu');
                const dropdownIcon = item.querySelector('.dropdown-icon');
                if (subMenu) {
                    subMenu.style.display = '';
                    subMenu.style.opacity = '';
                    subMenu.style.visibility = '';
                }
                if (dropdownIcon) dropdownIcon.style.transform = '';
            });
        }
        
        // Function to expand all dropdowns on mobile
        function expandAllMobileDropdowns() {
            if (window.innerWidth < 992) {
                document.querySelectorAll('.menu-item-has-children').forEach(function(item) {
                    const subMenu = item.querySelector('.dropdown-menu');
                    const dropdownIcon = item.querySelector('.dropdown-icon');
                    
                    item.classList.add('show');
                    if (subMenu) {
                        subMenu.style.display = 'block';
                        subMenu.style.opacity = '1';
                        subMenu.style.visibility = 'visible';
                    }
                    if (dropdownIcon) dropdownIcon.style.transform = 'rotate(180deg)';
                });
            }
        }
        
        // Function to collapse all dropdowns on mobile
        function collapseAllMobileDropdowns() {
            document.querySelectorAll('.menu-item-has-children').forEach(function(item) {
                const subMenu = item.querySelector('.dropdown-menu');
                const dropdownIcon = item.querySelector('.dropdown-icon');
                
                item.classList.remove('show');
                if (subMenu) {
                    subMenu.style.display = 'none';
                    subMenu.style.opacity = '0';
                    subMenu.style.visibility = 'hidden';
                }
                if (dropdownIcon) dropdownIcon.style.transform = '';
            });
        }
        
        // Watch for mobile menu toggle using click events
        function watchMobileMenuToggle() {
            const toggleButton = document.querySelector('.navbar-toggler');
            if (toggleButton) {
                toggleButton.addEventListener('click', function() {
                    // Wait a moment for Bootstrap to add the 'show' class
                    setTimeout(function() {
                        const navbarCollapse = document.querySelector('.navbar-collapse');
                        if (navbarCollapse && navbarCollapse.classList.contains('show')) {
                            // Mobile menu opened
                            expandAllMobileDropdowns();
                        } else {
                            // Mobile menu closed
                            collapseAllMobileDropdowns();
                        }
                    }, 100);
                });
            }
        }
        
        // Function to close all dropdowns
        function closeAllDropdowns() {
            document.querySelectorAll('.menu-item-has-children').forEach(function(item) {
                item.classList.remove('show');
                const subMenu = item.querySelector('.dropdown-menu');
                const dropdownIcon = item.querySelector('.dropdown-icon');
                if (subMenu) {
                    subMenu.style.display = 'none';
                    subMenu.style.opacity = '0';
                    subMenu.style.visibility = 'hidden';
                }
                if (dropdownIcon) dropdownIcon.style.transform = '';
            });
        }
        
        // Initialize on load
        initMobileDropdowns();
        watchMobileMenuToggle();
    });

    // Handle window resize to reset dropdowns
    let resizeTimer;
    window.addEventListener('resize', function() {
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(function() {
            if (window.innerWidth >= 992) {
                // Reset mobile dropdown states on desktop
                document.querySelectorAll('.menu-item-has-children').forEach(item => {
                    item.classList.remove('show');
                    const subMenu = item.querySelector('.dropdown-menu');
                    const dropdownIcon = item.querySelector('.dropdown-icon');
                    if (subMenu) {
                        subMenu.style.display = '';
                        subMenu.style.opacity = '';
                        subMenu.style.visibility = '';
                    }
                    if (dropdownIcon) dropdownIcon.style.transform = '';
                });
            } else {
                // Reset dropdown states when switching to mobile
                document.querySelectorAll('.menu-item-has-children').forEach(item => {
                    item.classList.remove('show');
                    const subMenu = item.querySelector('.dropdown-menu');
                    const dropdownIcon = item.querySelector('.dropdown-icon');
                    if (subMenu) {
                        subMenu.style.display = 'none';
                        subMenu.style.opacity = '0';
                        subMenu.style.visibility = 'hidden';
                    }
                    if (dropdownIcon) dropdownIcon.style.transform = '';
                });
            }
            
            // Close all dropdowns and reinitialize on resize
            closeAllDropdowns();
            initMobileDropdowns();
        }, 250);
    });

    // Sticky header scroll functionality
    function handleScroll() {
        if (window.scrollY > 50) {
            navbar.classList.add('is-scrolled');
        } else {
            navbar.classList.remove('is-scrolled');
        }
    }

    // Initial check in case page loads scrolled down
    handleScroll();

    // Add scroll event listener with throttling for performance
    let scrollTimer;
    window.addEventListener('scroll', function() {
        if (!scrollTimer) {
            scrollTimer = setTimeout(function() {
                handleScroll();
                scrollTimer = null;
            }, 10);
        }
    });

    // Close mobile dropdowns when clicking outside
    document.addEventListener('click', function(e) {
        if (window.innerWidth < 992) {
            if (!e.target.closest('.menu-item-has-children') && !e.target.closest('#mainNav')) {
                closeAllDropdowns();
            }
        }
    });
    
    // Initialize mobile dropdowns on page load
    function initializeMobileDropdowns() {
        if (window.innerWidth < 992) {
            document.querySelectorAll('.menu-item-has-children').forEach(item => {
                item.classList.remove('show');
                const subMenu = item.querySelector('.dropdown-menu');
                const dropdownIcon = item.querySelector('.dropdown-icon');
                if (subMenu) {
                    subMenu.style.display = 'none';
                    subMenu.style.opacity = '0';
                    subMenu.style.visibility = 'hidden';
                }
                if (dropdownIcon) dropdownIcon.style.transform = '';
            });
        }
    }
    
    // Initialize on page load
    initializeMobileDropdowns();
});
</script>
