<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta name="description" content="Learn about Dr. Stephen Quigley's approach to psychological care and his experience as a clinical psychologist.">
    <meta name="author" content="Dr. Stephen Quigley">
    <title>About - Dr. Stephen Quigley</title>
    <link rel="icon" type="image/x-icon" href="assets/favicon.ico">
    <script src="https://use.fontawesome.com/releases/v6.3.0/js/all.js" crossorigin="anonymous"></script>
    <link href="https://fonts.googleapis.com/css?family=Lora:400,700,400italic,700italic" rel="stylesheet" type="text/css">
    <link href="https://fonts.googleapis.com/css?family=Open+Sans:300italic,400italic,600italic,700italic,800italic,400,300,600,700,800" rel="stylesheet" type="text/css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <div id="header-placeholder"></div>

    <!-- Page Header-->
    <header class="masthead about-masthead">
        <img src="assets/img/about.jpg" alt="" class="masthead-bg">
        <div class="container position-relative px-4 px-lg-5">
            <div class="row gx-4 gx-lg-5 justify-content-center">
                <div class="col-md-10 col-lg-8 col-xl-7">
                    <div class="page-heading">
                        <h2 class="about-header">About My Practice</h2>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content-->
    <div class="container px-4 px-lg-5">
        <div class="row gx-4 gx-lg-5 justify-content-center">
            <div class="col-md-10 col-lg-10 col-xl-9">
                <div id="about-page-content">
                    <!-- Dynamically loaded from content/about.json -->
                </div>
            </div>
        </div>
    </div>

    <!-- Footer-->
    <div id="footer-placeholder"></div>

    <!-- Bootstrap core JS-->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Core theme JS-->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="js/scripts.js"></script>
    <script>
    document.addEventListener('DOMContentLoaded', function () {
        fetch('content/about.json')
            .then(r => { if (!r.ok) throw new Error(); return r.json(); })
            .then(renderAbout)
            .catch(() => {});
    });

    function renderAbout(data) {
        const container = document.getElementById('about-page-content');
        if (!container) return;
        let html = '';

        // Services Available section
        const sa = data.services_available || {};
        const specialities = (sa.specialities || []).map(s => '<li>' + escHtml(s) + '</li>').join('');
        const introParas = (sa.intro || '').split('\n\n').filter(Boolean)
            .map(p => '<p>' + escHtml(p.trim()) + '</p>').join('');
        html += '<div class="about-section"><h3 class="section-title">Services Available</h3>' +
            '<div class="about-content">' + introParas +
            '<ul class="bullet-list">' + specialities + '</ul>' +
            (sa.closing ? '<p>' + escHtml(sa.closing) + '</p>' : '') +
            (sa.liaison_note ? '<p>' + escHtml(sa.liaison_note) + '</p>' : '') +
            '</div></div>';

        // About Stephen section
        if (data.about_stephen) {
            html += '<div class="about-section"><h3 class="section-title">About Stephen</h3>' +
                '<div class="about-content">' + marked.parse(data.about_stephen) + '</div></div>';
        }

        // Therapeutic Approach section
        if (data.approach_cards && data.approach_cards.length) {
            const cards = data.approach_cards.map(card =>
                '<div class="col-md-6"><div class="approach-card">' +
                '<h4>' + escHtml(card.title) + '</h4>' +
                '<p>' + escHtml(card.text) + '</p>' +
                '</div></div>'
            ).join('');
            html += '<div class="about-section"><h3 class="section-title">My Therapeutic Approach</h3>' +
                '<div class="about-content"><p>I integrate multiple evidence-based therapeutic modalities tailored to each client\'s unique needs:</p>' +
                '<div class="row">' + cards + '</div></div></div>';
        }

        // Professional Standards section
        const ps = data.professional_standards || {};
        if (ps.credentials && ps.credentials.length) {
            const creds = ps.credentials.map(c => '<li>' + escHtml(c) + '</li>').join('');
            html += '<div class="about-section"><h3 class="section-title">Professional Standards</h3>' +
                '<div class="about-content">' +
                (ps.intro ? '<p>' + escHtml(ps.intro) + '</p>' : '') +
                '<ul class="bullet-list">' + creds + '</ul>' +
                (ps.closing ? '<p>' + escHtml(ps.closing) + '</p>' : '') +
                '</div></div>';
        }

        container.innerHTML = html;
    }

    function escHtml(str) {
        return String(str)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;');
    }
    </script>
</body>
</html>
